<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1180" viewBox="0 0 1800 1180">
  <defs>
    <style>
      .bg { fill: #f6f8fb; }
      .title { font: 700 34px Arial, sans-serif; fill: #142033; }
      .subtitle { font: 400 18px Arial, sans-serif; fill: #596579; }
      .lane-title { font: 700 18px Arial, sans-serif; fill: #1e2b42; }
      .group-title { font: 700 16px Arial, sans-serif; fill: #233550; }
      .box-title { font: 700 15px Arial, sans-serif; fill: #102033; }
      .box-text { font: 400 12.5px Arial, sans-serif; fill: #516174; }
      .tiny { font: 400 11px Arial, sans-serif; fill: #65758a; }
      .label { font: 700 11.5px Arial, sans-serif; fill: #33465f; }
      .lane { fill: #ffffff; stroke: #d5deea; stroke-width: 2; rx: 16; }
      .control { fill: #edf3ff; stroke: #4f7fd8; stroke-width: 2; rx: 12; }
      .runtime { fill: #eaf8f0; stroke: #2fa36b; stroke-width: 2; rx: 12; }
      .agent { fill: #f4f1ff; stroke: #7d66d8; stroke-width: 1.8; rx: 10; }
      .model { fill: #fff4e4; stroke: #df9630; stroke-width: 2; rx: 12; }
      .data { fill: #eef8fb; stroke: #3d94a8; stroke-width: 2; rx: 12; }
      .guard { fill: #fff0f0; stroke: #df6464; stroke-width: 2; rx: 12; }
      .store { fill: #f9fafc; stroke: #aeb8c7; stroke-width: 2; rx: 12; }
      .optional { fill: #ffffff; stroke: #b5bdca; stroke-width: 2; stroke-dasharray: 8 6; rx: 12; }
      .arrow { stroke: #40536b; stroke-width: 2.2; fill: none; marker-end: url(#arrow); }
      .arrow-soft { stroke: #7a899c; stroke-width: 1.8; fill: none; marker-end: url(#arrow-soft); stroke-dasharray: 6 6; }
      .arrow-strong { stroke: #22344d; stroke-width: 3; fill: none; marker-end: url(#arrow); }
    </style>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#40536b"/>
    </marker>
    <marker id="arrow-soft" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#7a899c"/>
    </marker>
  </defs>

  <rect class="bg" x="0" y="0" width="1800" height="1180"/>
  <text class="title" x="60" y="62">GreenNode VKS Intelligence - Production Multi-Agent Architecture</text>
  <text class="subtitle" x="60" y="94">Docker/n8n controls production workflows. AgentBase runs the supervisor and specialist agents. Model router selects Qwen, Gemma, or Claude with budgets, retries, fallback, and JSON guardrails.</text>

  <!-- Left lane: channels and control plane -->
  <rect class="lane" x="45" y="135" width="350" height="880"/>
  <text class="lane-title" x="75" y="172">Channels &amp; Control Plane</text>

  <rect class="control" x="75" y="210" width="290" height="88"/>
  <text class="box-title" x="100" y="242">Telegram Channel</text>
  <text class="box-text" x="100" y="266">Q&amp;A messages</text>
  <text class="box-text" x="100" y="285">Digest delivery and approval</text>

  <rect class="control" x="75" y="330" width="290" height="118"/>
  <text class="box-title" x="100" y="362">n8n Workflows</text>
  <text class="box-text" x="100" y="386">weekly-digest-production</text>
  <text class="box-text" x="100" y="405">daily-competitor-monitor</text>
  <text class="box-text" x="100" y="424">monthly-executive-brief</text>

  <rect class="control" x="75" y="480" width="290" height="92"/>
  <text class="box-title" x="100" y="512">Docker Runtime</text>
  <text class="box-text" x="100" y="536">n8n + Postgres + Caddy</text>
  <text class="box-text" x="100" y="555">Watchtower optional</text>

  <rect class="guard" x="75" y="605" width="290" height="96"/>
  <text class="box-title" x="100" y="637">Production Controls</text>
  <text class="box-text" x="100" y="661">retry, timeout, approval</text>
  <text class="box-text" x="100" y="680">failed-job alert routing</text>

  <rect class="optional" x="75" y="735" width="290" height="95"/>
  <text class="box-title" x="100" y="767">Local Fallback</text>
  <text class="box-text" x="100" y="791">uv run python run_agent.py</text>
  <text class="box-text" x="100" y="810">kept for rollback and debug</text>

  <!-- Center lane: AgentBase runtime -->
  <rect class="lane" x="430" y="135" width="610" height="880"/>
  <text class="lane-title" x="460" y="172">AgentBase Python Runtime</text>

  <rect class="runtime" x="470" y="210" width="530" height="96"/>
  <text class="box-title" x="500" y="242">main_platform.py / AgentBase App</text>
  <text class="box-text" x="500" y="266">/health, /invocations, /tasks/*</text>
  <text class="box-text" x="500" y="285">single production API surface for n8n and Telegram flows</text>

  <rect class="runtime" x="470" y="345" width="530" height="126"/>
  <text class="box-title" x="500" y="377">Supervisor Agent</text>
  <text class="box-text" x="500" y="401">classify task, create plan, select agents</text>
  <text class="box-text" x="500" y="420">enforce budget, timeout, retry, fallback policy</text>
  <text class="box-text" x="500" y="439">merge structured results into final artifact</text>

  <text class="group-title" x="470" y="520">Specialist Agents</text>

  <rect class="agent" x="470" y="545" width="160" height="78"/>
  <text class="box-title" x="492" y="575">Q&amp;A Agent</text>
  <text class="tiny" x="492" y="597">fast memory answer</text>

  <rect class="agent" x="650" y="545" width="160" height="78"/>
  <text class="box-title" x="672" y="575">Market Trend</text>
  <text class="tiny" x="672" y="597">K8s, AI infra news</text>

  <rect class="agent" x="830" y="545" width="160" height="78"/>
  <text class="box-title" x="852" y="575">Competitor</text>
  <text class="tiny" x="852" y="597">AWS, Bizfly, FPT</text>

  <rect class="agent" x="470" y="650" width="160" height="78"/>
  <text class="box-title" x="492" y="680">Pricing</text>
  <text class="tiny" x="492" y="702">TCO, assumptions</text>

  <rect class="agent" x="650" y="650" width="160" height="78"/>
  <text class="box-title" x="672" y="680">Regulatory</text>
  <text class="tiny" x="672" y="702">VN compliance</text>

  <rect class="agent" x="830" y="650" width="160" height="78"/>
  <text class="box-title" x="852" y="680">Positioning</text>
  <text class="tiny" x="852" y="702">GTM and sales angle</text>

  <rect class="agent" x="470" y="755" width="160" height="78"/>
  <text class="box-title" x="492" y="785">Battlecard</text>
  <text class="tiny" x="492" y="807">competitor playbook</text>

  <rect class="agent" x="650" y="755" width="160" height="78"/>
  <text class="box-title" x="672" y="785">Memory Curator</text>
  <text class="tiny" x="672" y="807">proposed patches</text>

  <rect class="agent" x="830" y="755" width="160" height="78"/>
  <text class="box-title" x="852" y="785">Quality Critic</text>
  <text class="tiny" x="852" y="807">pass/review/block</text>

  <rect class="guard" x="470" y="870" width="250" height="92"/>
  <text class="box-title" x="500" y="902">Quality Gate</text>
  <text class="box-text" x="500" y="926">source coverage, format, length</text>
  <text class="box-text" x="500" y="945">hard blockers before publish</text>

  <rect class="runtime" x="750" y="870" width="250" height="92"/>
  <text class="box-title" x="780" y="902">Synthesis Layer</text>
  <text class="box-text" x="780" y="926">final markdown</text>
  <text class="box-text" x="780" y="945">Telegram preview</text>

  <!-- Right lane: model pool and guardrails -->
  <rect class="lane" x="1080" y="135" width="315" height="880"/>
  <text class="lane-title" x="1110" y="172">Model Router</text>

  <rect class="model" x="1110" y="210" width="255" height="112"/>
  <text class="box-title" x="1138" y="242">LLM Router</text>
  <text class="box-text" x="1138" y="266">provider abstraction</text>
  <text class="box-text" x="1138" y="285">workload-based model policy</text>
  <text class="box-text" x="1138" y="304">token and latency metadata</text>

  <rect class="model" x="1110" y="365" width="255" height="88"/>
  <text class="box-title" x="1138" y="397">Gemma</text>
  <text class="box-text" x="1138" y="421">google/gemma-4-31b-it</text>
  <text class="box-text" x="1138" y="440">Q&amp;A, summarization</text>

  <rect class="model" x="1110" y="485" width="255" height="88"/>
  <text class="box-title" x="1138" y="517">Qwen</text>
  <text class="box-text" x="1138" y="541">worker extraction</text>
  <text class="box-text" x="1138" y="560">critic and structured output</text>

  <rect class="model" x="1110" y="605" width="255" height="88"/>
  <text class="box-title" x="1138" y="637">Claude</text>
  <text class="box-text" x="1138" y="661">optional premium fallback</text>
  <text class="box-text" x="1138" y="680">high-impact synthesis</text>

  <rect class="guard" x="1110" y="735" width="255" height="146"/>
  <text class="box-title" x="1138" y="767">Reliability Guardrails</text>
  <text class="box-text" x="1138" y="791">budget policy</text>
  <text class="box-text" x="1138" y="810">timeout policy</text>
  <text class="box-text" x="1138" y="829">retry and fallback trace</text>
  <text class="box-text" x="1138" y="848">JSON parse and repair guard</text>

  <!-- Far right lane: data and audit -->
  <rect class="lane" x="1435" y="135" width="320" height="880"/>
  <text class="lane-title" x="1465" y="172">Knowledge, Data &amp; Audit</text>

  <rect class="data" x="1465" y="210" width="260" height="100"/>
  <text class="box-title" x="1493" y="242">Workspace Memory</text>
  <text class="box-text" x="1493" y="266">memory/, research/</text>
  <text class="box-text" x="1493" y="285">competitors, pricing, product</text>

  <rect class="data" x="1465" y="350" width="260" height="100"/>
  <text class="box-title" x="1493" y="382">External Sources</text>
  <text class="box-text" x="1493" y="406">Google News RSS</text>
  <text class="box-text" x="1493" y="425">competitor and pricing pages</text>

  <rect class="store" x="1465" y="490" width="260" height="120"/>
  <text class="box-title" x="1493" y="522">Run Artifacts</text>
  <text class="box-text" x="1493" y="546">outputs/runs/*</text>
  <text class="box-text" x="1493" y="565">request, plan, agent JSON</text>
  <text class="box-text" x="1493" y="584">quality, final, metadata</text>

  <rect class="store" x="1465" y="650" width="260" height="100"/>
  <text class="box-title" x="1493" y="682">GitHub Repo</text>
  <text class="box-text" x="1493" y="706">versioned knowledge base</text>
  <text class="box-text" x="1493" y="725">approved output commits</text>

  <rect class="guard" x="1465" y="790" width="260" height="116"/>
  <text class="box-title" x="1493" y="822">Human Approval</text>
  <text class="box-text" x="1493" y="846">approve/reject publish</text>
  <text class="box-text" x="1493" y="865">approve memory patches</text>
  <text class="box-text" x="1493" y="884">block risky output</text>

  <!-- Main arrows -->
  <path class="arrow-strong" d="M365 389 C410 389, 425 258, 470 258"/>
  <text class="label" x="384" y="336">HTTP task call</text>

  <path class="arrow" d="M365 254 C420 254, 425 258, 470 258"/>
  <text class="label" x="390" y="238">Q&amp;A webhook</text>

  <path class="arrow" d="M735 306 L735 345"/>
  <path class="arrow" d="M735 471 C735 505, 735 515, 735 545"/>
  <text class="label" x="752" y="510">agent plan</text>

  <path class="arrow" d="M1000 405 C1050 405, 1060 266, 1110 266"/>
  <text class="label" x="1035" y="330">model calls</text>

  <path class="arrow-soft" d="M1110 807 C1060 807, 1045 690, 990 690"/>
  <text class="label" x="1014" y="768">guardrails</text>

  <path class="arrow" d="M1000 916 C1070 916, 1390 550, 1465 550"/>
  <text class="label" x="1195" y="858">save artifacts</text>

  <path class="arrow" d="M1000 916 C1070 916, 1390 260, 1465 260"/>
  <text class="label" x="1202" y="400">load memory</text>

  <path class="arrow" d="M1465 400 C1260 400, 1200 690, 990 690"/>
  <text class="label" x="1230" y="520">fresh evidence</text>

  <path class="arrow" d="M720 916 L750 916"/>
  <path class="arrow" d="M875 870 C875 840, 875 836, 875 833"/>

  <path class="arrow" d="M875 962 C875 1035, 220 1035, 220 701"/>
  <text class="label" x="480" y="1048">preview, alert, publish decision</text>

  <path class="arrow" d="M1725 848 C1770 848, 1770 1070, 220 1070 C185 1070, 185 298, 220 298"/>
  <text class="label" x="920" y="1092">approval response</text>

  <path class="arrow-soft" d="M1465 700 C1320 700, 1180 945, 1000 945"/>
  <text class="label" x="1200" y="930">commit approved output</text>

  <!-- Bottom note -->
  <rect class="optional" x="45" y="1040" width="1710" height="82"/>
  <text class="group-title" x="75" y="1072">Production rule</text>
  <text class="box-text" x="75" y="1098">n8n schedules and controls delivery. AgentBase owns reasoning. Supervisor can return partial results, but publish requires quality pass or human approval. Fallback can reduce completeness, but must not reduce truthfulness requirements.</text>
</svg>
