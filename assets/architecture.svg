<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="520" viewBox="0 0 1500 520">
  <defs>
    <marker id="a" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8Z" fill="#aaaaaa"/>
    </marker>
    <style>
      text { font-family: Arial, Helvetica, sans-serif; }
      .node { fill: #ffffff; stroke: #c4c4c4; stroke-width: 2.5; }
      .node-hi { fill: #f8f800; stroke: #c0c000; stroke-width: 3.5; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="1500" height="520" fill="#ffffff"/>

  <!-- ===== TRIGGER (left, person icon) ===== -->
  <circle cx="110" cy="208" r="26" fill="none" stroke="#1a1a1a" stroke-width="3"/>
  <path d="M62,260 Q62,242 110,242 Q158,242 158,260" fill="none" stroke="#1a1a1a" stroke-width="3"/>
  <text font-weight="bold" font-size="19" fill="#111" text-anchor="middle" x="110" y="292">Trigger</text>
  <text font-size="13" fill="#666" text-anchor="middle" x="110" y="312">Telegram</text>
  <text font-size="13" fill="#666" text-anchor="middle" x="110" y="330">n8n Scheduler</text>

  <!-- Arrow: Trigger → Orchestrator (top) -->
  <line x1="172" y1="252" x2="256" y2="252" stroke="#aaaaaa" stroke-width="2" marker-end="url(#a)"/>
  <text font-size="12" fill="#555" text-anchor="middle" x="214" y="244">Câu hỏi / Tác vụ</text>

  <!-- Arrow: Orchestrator → Trigger (bottom) -->
  <line x1="256" y1="276" x2="172" y2="276" stroke="#aaaaaa" stroke-width="2" marker-end="url(#a)"/>
  <text font-size="12" fill="#555" text-anchor="middle" x="214" y="294">Phản hồi / Báo cáo</text>


  <!-- ===== ORCHESTRATOR (left-center) ===== -->
  <rect class="node" x="258" y="222" width="180" height="108" rx="14"/>
  <!-- monitor icon -->
  <rect x="274" y="234" width="42" height="30" rx="5" fill="none" stroke="#aaa" stroke-width="2"/>
  <line x1="287" y1="264" x2="302" y2="264" stroke="#aaa" stroke-width="2"/>
  <text font-family="monospace" font-size="13" fill="#aaa" x="277" y="256">&lt;/&gt;</text>
  <text font-weight="bold" font-size="18" fill="#111" text-anchor="middle" x="360" y="270">Orchestrator</text>
  <text font-size="13" fill="#666" text-anchor="middle" x="360" y="290">intent classifier</text>
  <text font-size="12" fill="#888" text-anchor="middle" x="360" y="308">memory_lookup · research</text>

  <!-- Arrow: Orchestrator → Supervisor (top) -->
  <line x1="440" y1="252" x2="518" y2="252" stroke="#aaaaaa" stroke-width="2" marker-end="url(#a)"/>
  <text font-size="12" fill="#555" text-anchor="middle" x="479" y="244">Request</text>

  <!-- Arrow: Supervisor → Orchestrator (bottom) -->
  <line x1="518" y1="278" x2="440" y2="278" stroke="#aaaaaa" stroke-width="2" marker-end="url(#a)"/>
  <text font-size="12" fill="#555" text-anchor="middle" x="479" y="296">Progress</text>


  <!-- ===== QUALITY GATE (top center) ===== -->
  <rect class="node" x="520" y="24" width="230" height="88" rx="14"/>
  <!-- checkmark -->
  <path d="M548,68 L564,84 L596,50" fill="none" stroke="#1a1a1a" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
  <text font-weight="bold" font-size="19" fill="#111" text-anchor="middle" x="672" y="58">Quality Gate</text>
  <text font-size="12" fill="#666" text-anchor="middle" x="672" y="78">PASS · REVISE · BLOCK</text>

  <!-- Arrow: Supervisor → QualityGate (left side, upward) -->
  <line x1="604" y1="198" x2="604" y2="114" stroke="#aaaaaa" stroke-width="2" marker-end="url(#a)"/>
  <text font-size="12" fill="#555" text-anchor="end" x="600" y="162">Propose output</text>

  <!-- Arrow: QualityGate → Supervisor (right side, downward) -->
  <line x1="662" y1="114" x2="662" y2="198" stroke="#aaaaaa" stroke-width="2" marker-end="url(#a)"/>
  <text font-size="12" fill="#555" text-anchor="start" x="666" y="162">Allow / Revise / Block</text>


  <!-- ===== SUPERVISOR CORE (center, highlighted yellow) ===== -->
  <rect class="node-hi" x="520" y="198" width="230" height="168" rx="16"/>
  <!-- circular arrows icon -->
  <circle cx="635" cy="256" r="30" fill="none" stroke="#333" stroke-width="2.5"/>
  <polygon points="635,223 628,236 642,236" fill="#333"/>
  <polygon points="635,289 642,276 628,276" fill="#333"/>
  <text font-weight="bold" font-size="22" fill="#111" text-anchor="middle" x="635" y="310">Supervisor</text>
  <text font-size="15" fill="#333" text-anchor="middle" x="635" y="332">Core</text>


  <!-- Arrow: Supervisor → Specialists (upper diagonal) -->
  <line x1="752" y1="252" x2="830" y2="228" stroke="#aaaaaa" stroke-width="2" marker-end="url(#a)"/>
  <text font-size="12" fill="#555" text-anchor="middle" x="791" y="232">Dispatch agents</text>

  <!-- Arrow: Specialists → Supervisor (lower diagonal) -->
  <line x1="830" y1="296" x2="752" y2="318" stroke="#aaaaaa" stroke-width="2" marker-end="url(#a)"/>
  <text font-size="12" fill="#555" text-anchor="middle" x="791" y="322">Agent results</text>


  <!-- ===== SPECIALIST AGENTS (right) ===== -->
  <rect class="node" x="830" y="130" width="215" height="268" rx="14"/>
  <!-- hammer icon -->
  <path d="M852,158 L852,175 L867,175 L867,158" fill="none" stroke="#aaa" stroke-width="2"/>
  <line x1="847" y1="158" x2="872" y2="158" stroke="#aaa" stroke-width="3.5"/>
  <line x1="859" y1="175" x2="859" y2="188" stroke="#aaa" stroke-width="2"/>
  <text font-weight="bold" font-size="17" fill="#111" text-anchor="middle" x="937" y="168">Specialist</text>
  <text font-weight="bold" font-size="17" fill="#111" text-anchor="middle" x="937" y="190">Agents</text>
  <text font-size="13" fill="#888" text-anchor="middle" x="937" y="218">competitor · pricing</text>
  <text font-size="13" fill="#888" text-anchor="middle" x="937" y="238">regulatory · market trend</text>
  <text font-size="13" fill="#888" text-anchor="middle" x="937" y="258">positioning · battlecard</text>
  <text font-size="13" fill="#888" text-anchor="middle" x="937" y="278">memory curator</text>
  <text font-size="13" fill="#888" text-anchor="middle" x="937" y="298">quality critic</text>
  <text font-size="13" fill="#888" text-anchor="middle" x="937" y="318">qa agent</text>


  <!-- Arrow: Specialists → LLM (upper) -->
  <line x1="1046" y1="248" x2="1122" y2="264" stroke="#aaaaaa" stroke-width="2" marker-end="url(#a)"/>
  <text font-size="12" fill="#555" text-anchor="middle" x="1084" y="248">LLM call</text>

  <!-- Arrow: LLM → Specialists (lower) -->
  <line x1="1122" y1="296" x2="1046" y2="296" stroke="#aaaaaa" stroke-width="2" marker-end="url(#a)"/>
  <text font-size="12" fill="#555" text-anchor="middle" x="1084" y="314">Response</text>


  <!-- ===== LLM ROUTER (far right) ===== -->
  <rect class="node" x="1124" y="216" width="220" height="140" rx="14"/>
  <!-- cube/box icon -->
  <path d="M1146,242 L1168,234 L1190,242 L1190,264 L1168,272 L1146,264Z" fill="none" stroke="#aaa" stroke-width="2"/>
  <line x1="1168" y1="234" x2="1168" y2="272" stroke="#aaa" stroke-width="1.5"/>
  <line x1="1146" y1="253" x2="1168" y2="259" stroke="#aaa" stroke-width="1.5"/>
  <text font-weight="bold" font-size="18" fill="#111" text-anchor="middle" x="1254" y="262">LLM Router</text>
  <text font-size="13" fill="#666" text-anchor="middle" x="1254" y="284">Gemma · Qwen · Claude</text>
  <text font-size="12" fill="#888" text-anchor="middle" x="1254" y="304">JSON guard · retry</text>
  <text font-size="12" fill="#888" text-anchor="middle" x="1254" y="322">budget · timeout</text>


  <!-- ===== MEMORY & STORAGE (bottom) ===== -->
  <rect class="node" x="520" y="416" width="230" height="88" rx="14"/>
  <!-- database icon -->
  <ellipse cx="554" cy="432" rx="22" ry="8" fill="none" stroke="#aaa" stroke-width="2"/>
  <path d="M532,432 L532,462 Q532,470 554,470 Q576,470 576,462 L576,432" fill="none" stroke="#aaa" stroke-width="2"/>
  <ellipse cx="554" cy="446" rx="22" ry="8" fill="none" stroke="#aaa" stroke-width="1.5"/>
  <ellipse cx="554" cy="460" rx="22" ry="7" fill="none" stroke="#aaa" stroke-width="1" stroke-dasharray="3 3"/>
  <text font-weight="bold" font-size="17" fill="#111" text-anchor="middle" x="652" y="450">Memory &amp; Storage</text>
  <text font-size="13" fill="#666" text-anchor="middle" x="652" y="470">workspace · artifacts · GitHub</text>

  <!-- Arrow: Supervisor → Memory (left side, downward) -->
  <line x1="607" y1="368" x2="607" y2="414" stroke="#aaaaaa" stroke-width="2" marker-end="url(#a)"/>
  <text font-size="12" fill="#555" text-anchor="end" x="603" y="397">Persist</text>

  <!-- Arrow: Memory → Supervisor (right side, upward) -->
  <line x1="661" y1="414" x2="661" y2="368" stroke="#aaaaaa" stroke-width="2" marker-end="url(#a)"/>
  <text font-size="12" fill="#555" text-anchor="start" x="665" y="397">Load memory</text>

</svg>
